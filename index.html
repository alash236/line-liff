<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>

async function main() {

    try {

        await liff.init({
            liffId: "2010096295-2ZCYNzyG"
        });

        // 必須從 LINE 開啟
        if (!liff.isInClient()) {

            alert("請從 LINE 開啟");
            return;
        }

        // 必須登入
        if (!liff.isLoggedIn()) {

            liff.login();
            return;
        }

        // 發送訊息
        await liff.sendMessages([
            {
                type: 'text',
                text: '測試訊息'
            }
        ]);

        // 關閉
        liff.closeWindow();

    } catch (e) {

        alert(
            e.message + "\n\n" +
            JSON.stringify(e)
        );

        console.error(e);
    }
}

main();

</script>

</body>
</html>
